<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Ledger — PPSC Mnemonic Terminal</title>
  
  <!-- Premium Fonts from Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Vis.js Library for Network Graph Sourcing (Using CDN) -->
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  
  <!-- Leaflet.js for Tactical Geographical Maps -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <!-- Link to external stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOP CONSOLE HEADER -->
  <header class="console-header">
    <div class="brand-block">
      <div class="logo-indicator"></div>
      <h1 class="console-title">THE LEDGER</h1>
      <span class="console-subtitle">// PPSC.INTEL.TERMINAL</span>
    </div>
    
    <!-- STATS AND PROGRESS BAR -->
    <div class="header-stats">
      <div class="stat-box">
        <span class="stat-label">RANK:</span>
        <span class="stat-value" id="user-rank">Field Informant</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">XP:</span>
        <span class="stat-value" id="user-xp">0000</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">INTEGRITY:</span>
        <div class="integrity-progress-wrap">
          <div class="integrity-bar" id="integrity-bar" style="width: 0%;"></div>
          <span class="integrity-val" id="integrity-val">0%</span>
        </div>
      </div>
    </div>
    
    <!-- CONFIG CONTROLS -->
    <div class="header-controls">
      <button class="btn-terminal" id="btn-drill-launch" onclick="launchDrillMode()">
        <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        ✍️ QUIZ ME
      </button>
      <button class="btn-theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle visual theme">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
  </header>

  <!-- MOBILE VIEW PANEL SWITCHER -->
  <div class="mobile-panel-tabs">
    <button class="mobile-tab active" id="mobile-tab-left" onclick="switchMobilePanel('left')">📁 DIRECTORY</button>
    <button class="mobile-tab" id="mobile-tab-right" onclick="switchMobilePanel('right')">🗺️ MAP</button>
  </div>

  <!-- MAIN TERMINAL AREA -->
  <main class="terminal-container">
    
    <!-- LEFT WINDOW: DIRECTORY & FILES TERMINAL -->
    <section class="panel panel-left mobile-active">
      <!-- HEADER WITH BREADCRUMBS & CONTROLS -->
      <div class="panel-header" style="display: flex; flex-direction: column; height: auto; padding: 12px 18px; gap: 8px;">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
          <div style="display: flex; align-items: center; gap: 8px;">
            <button class="btn-terminal" id="btn-dir-back" onclick="navigateBack()" style="padding: 4px 8px; font-size: 11px; display: none;">⬅ BACK</button>
            <span class="console-subtitle" style="font-family: var(--font-mono); font-size: 11px; color: var(--color-accent);" id="dir-path">ROOT</span>
          </div>
          <!-- Mode toggles placed compactly -->
          <div class="mode-toggle-wrap" style="margin: 0;">
            <button class="mode-toggle-btn" id="btn-mode-dashboard" onclick="setMode('dashboard')">DASHBOARD</button>
            <button class="mode-toggle-btn active" id="btn-mode-folders" onclick="setMode('folders')">FOLDERS</button>
            <button class="mode-toggle-btn" id="btn-mode-timeline" onclick="setMode('timeline')">TIMELINE</button>
            <button class="mode-toggle-btn" id="btn-mode-papers" onclick="setMode('papers')">PAPERS</button>
            <button class="mode-toggle-btn" id="btn-mode-atlas" onclick="setMode('atlas')">ATLAS</button>
          </div>
        </div>
      </div>
      
      <!-- SEARCH BAR -->
      <div class="search-wrap" style="padding: 10px 18px 6px 18px;">
        <div style="position: relative;">
          <input type="text" id="console-search" placeholder="Search files, context, tags..." oninput="handleSearch()" style="width: 100%; height: 36px; background-color: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; padding-left: 36px; color: var(--text-primary); outline: none;">
          <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-muted);">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </div>
      </div>
      
      <!-- DIRECTORY VIEW: GRID OR LIST CANVAS -->
      <div class="dossier-list" id="dossier-list" style="flex: 1; overflow-y: auto; padding: 10px 18px;">
        <!-- Rendered dynamically as folder cards grid or file list -->
      </div>
      
      <!-- FOOTER IMPORTER -->
      <div class="panel-footer" style="padding: 10px 18px;">
        <label class="btn-import-label" style="width: 100%; text-align: center; border: 1px dashed var(--border); padding: 8px; font-family: var(--font-mono); font-size: 11px; cursor: pointer; color: var(--text-secondary);">
          <input type="file" id="json-importer" accept=".json" style="display:none;" onchange="importIntelPack(event)">
          LOAD INTEL PACK (.JSON)
        </label>
      </div>
    </section>

    <!-- RIGHT WINDOW: GEOGRAPHICAL CONNECTION MAP -->
    <section class="panel panel-right" style="flex: 1; position: relative;">
      <!-- Map Container -->
      <div id="tactical-map" class="map-canvas"></div>
    </section>

  </main>

  <!-- FULLSCREEN DRILL BRIEFING OVERLAY -->
  <div class="drill-overlay" id="drill-overlay">
    <div class="drill-modal">
      <div class="drill-header">
        <div class="brand-block">
          <div class="logo-indicator active"></div>
          <span class="drill-heading">ACTIVE INTEL DRILL</span>
        </div>
        <button class="btn-close-drill" onclick="exitDrillMode()">&times;</button>
      </div>
      
      <div class="drill-content" id="drill-content">
        <!-- Loaded dynamically -->
      </div>
    </div>
  </div>

  <!-- SCRIPT FILES -->
  <script src="db.js"></script>
  <script src="briefings.js"></script>
  <script src="app.js"></script>
</body>
</html>
